<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Analyzer - Demand Consensus</title>
    <!-- third‑party libraries from CDN; use specific versions to avoid warnings -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <!-- plotly v2.x (replace with latest release as needed) -->
    <script src="https://cdn.plot.ly/plotly-2.26.1.min.js"></script>
<!--
    Note: Tracking Prevention messages come from browser blocking third-party
    storage/cookies when loading these CDN scripts.  They are harmless for our
    use case; if you need to avoid them you can serve the libraries locally or
    adjust browser privacy settings. -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            color: #666;
            font-size: 1.1em;
        }

        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 25px;
        }

        .sidebar {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .sidebar h2 {
            color: #333;
            font-size: 1.3em;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        .form-group input[type="file"],
        .form-group select,
        .form-group input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 0.95em;
            transition: border-color 0.3s;
        }

        .form-group input[type="file"]:hover,
        .form-group select:hover,
        .form-group input[type="number"]:hover {
            border-color: #667eea;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            margin-bottom: 0;
            cursor: pointer;
            font-weight: 500;
        }

        .radio-group input[type="radio"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .content {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #eee;
            margin-bottom: 25px;
            gap: 5px;
        }

        .tab-button {
            background: none;
            border: none;
            padding: 12px 20px;
            font-size: 1em;
            color: #666;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin: 0;
            width: auto;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-button:hover {
            transform: none;
            box-shadow: none;
            color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .metric-card h3 {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .metric-card .value {
            font-size: 2em;
            font-weight: bold;
        }

        .chart-container {
            margin: 30px 0;
            position: relative;
            height: 400px;
        }

        .plant-summary {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .plant-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .plant-card h3 {
            font-size: 1.3em;
            margin-bottom: 15px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
            padding-bottom: 10px;
        }

        .plant-card .plant-stat {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 0.95em;
        }

        .plant-card .plant-stat-value {
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table thead {
            background: #f5f5f5;
        }

        table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #667eea;
        }

        table td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        table tbody tr:hover {
            background: #f9f9f9;
        }

        .outlier {
            background-color: #ffe6e6;
        }

        .outlier-cell {
            color: #d32f2f;
            font-weight: 600;
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .filter-section {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .filter-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .filter-row label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        .filter-row select,
        .filter-row input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 0.95em;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 1.1em;
        }

        .download-btn {
            background: #28a745;
            margin-top: 20px;
        }

        .download-btn:hover {
            background: #218838;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: relative;
                top: 0;
            }

            .metrics {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .metrics {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-wrap: wrap;
            }

            .tab-button {
                padding: 10px 15px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Excel Analyzer</h1>
            <p>Compare two Excel files and identify outliers</p>
        </header>

        <div class="main-content">
            <!-- Sidebar -->
            <div class="sidebar">
                <h2>⚙️ Configuration</h2>

                <!-- File Upload -->
                <div class="form-group">
                    <label>📁 File 1</label>
                    <input type="file" id="file1" accept=".xlsx,.xls,.csv" />
                </div>

                <div class="form-group">
                    <label>📁 File 2</label>
                    <input type="file" id="file2" accept=".xlsx,.xls,.csv" />
                </div>

                <!-- Sheet Selection -->
                <div class="form-group">
                    <label>📄 Sheet from File 1</label>
                    <select id="sheet1" disabled>
                        <option>Select sheet...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>📄 Sheet from File 2</label>
                    <select id="sheet2" disabled>
                        <option>Select sheet...</option>
                    </select>
                </div>

                <!-- Threshold Selection -->
                <div class="form-group">
                    <label>🎯 Outlier Threshold</label>
                    <div class="radio-group">
                        <label><input type="radio" name="threshold" value="1" /> >1%</label>
                        <label><input type="radio" name="threshold" value="2" /> >2%</label>
                        <label><input type="radio" name="threshold" value="5" checked /> >5%</label>
                        <label><input type="radio" name="threshold" value="10" /> >10%</label>
                        <label><input type="radio" name="threshold" value="15" /> >15%</label>
                        <label><input type="radio" name="threshold" value="20" /> >20%</label>
                        <label><input type="radio" name="threshold" value="25" /> >25%</label>
                        <label><input type="radio" name="threshold" value="30" /> >30%</label>
                        <label><input type="radio" name="threshold" value="40" /> >40%</label>
                        <label><input type="radio" name="threshold" value="50" /> >50%</label>
                        <label><input type="radio" name="threshold" value="60" /> >60%</label>
                        <label><input type="radio" name="threshold" value="70" /> >70%</label>
                        <label><input type="radio" name="threshold" value="80" /> >80%</label>
                        <label><input type="radio" name="threshold" value="90" /> >90%</label>
                        <label><input type="radio" name="threshold" value="custom" /> Custom</label>
                    </div>
                </div>

                <div class="form-group" id="customThresholdGroup" style="display: none;">
                    <label>Custom Threshold (%)</label>
                    <input type="number" id="customThreshold" min="1" max="100" value="5" />
                </div>

                <!-- Plant and Material Column Selection -->
                <div class="form-group">
                    <label>🏭 Plant Column (Optional)</label>
                    <select id="plantColumn" disabled>
                        <option value="">None (No grouping)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>📦 Material Column (Optional)</label>
                    <select id="materialColumn" disabled>
                        <option value="">None</option>
                    </select>
                </div>

                <button id="compareBtn" disabled="true">🔍 Compare Files</button>
            </div>

            <!-- Main Content -->
            <div class="content" id="mainContent">
                <div class="no-data">👈 Upload two Excel files to begin analysis</div>
            </div>
        </div>
    </div>

    <script src="src/app.js"></script>
</body>
</html>
